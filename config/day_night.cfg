; Configuración del ciclo día/noche (GDD 4.9: duración editable sin tocar
; código, para poder buscar el balance más jugable con playtesting).
; Editable a mano — TimeManager la lee al arrancar; si falta el archivo o
; una clave, usa los defaults del código.

[day_night]

; duración de un día COMPLETO de juego (24hs del mundo), en minutos reales.
; punto de partida del GDD: 10-15 minutos.
day_length_minutes = 12.0

; hora del mundo a la que arranca una partida nueva
start_hour = 8.0

; hora a la que te despierta la cama al dormir
wake_hour = 7.0
